<!DOCTYPE html>
<html>
<head>
<title>GitHub Issues Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="bg-white w-80 p-8 rounded-lg shadow text-center">

<img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-14 mx-auto mb-3">

<h1 class="text-xl font-bold">GitHub Issues Tracker</h1>

<p class="text-gray-500 text-sm mb-4">
Manage and track project issues
</p>

<input id="username"
class="border w-full p-2 mb-3 rounded"
placeholder="Enter Username">

<input id="password"
type="password"
class="border w-full p-2 mb-3 rounded"
placeholder="Enter Password">

<button onclick="login()"
class="bg-purple-600 text-white w-full py-2 rounded">
Sign In
</button>

<div class="bg-gray-100 p-2 mt-4 text-sm rounded">
Username: admin <br>
Password: admin123
</div>

</div>

<script>

function login(){

const user=document.getElementById("username").value
const pass=document.getElementById("password").value

if(user==="admin" && pass==="admin123"){
window.location.href="dashboard.html"
}
else{
alert("Invalid Credentials")
}

}

</script>

</body>
</html>
